apiVersion: apps/v1
kind: Service
metadata:
  name: backend
  namespace: default
spec:
  replicas: 1
  # Forces K3s to kill the old backend pod before starting the new one
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: your-dockerhub-username/backend:latest
        ports:
        - containerPort: 5000
        # Managed resource boundaries to avoid memory leaks crashing the server
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
