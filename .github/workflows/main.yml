name: Production 3-Tier Web App CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v3
    
    - name: Authenticate with DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 2. Copy the contents of the K3S folder to the EC2 instance
    - name: Copy Kubernetes manifests to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        source: "K3S/*"
        target: "~/k3s_deploy"
        strip_components: 1    
    - name: Build & Push API Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

    - name: Build & Push Static UI Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest
        
    - name: Deploy on K3s master using SSH
      uses: appleboy/ssh-action@v1.2.2
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
            set -e
            
            # Navigate to the folder where SCP just dropped the files
            cd ~/k3s_deploy
            
            echo "Applying Kubernetes files..."
            kubectl apply -f secrets.yaml
            kubectl apply -f database.yaml
            kubectl apply -f mysql.yaml
            kubectl apply -f backend.yaml
            kubectl apply -f backend-alias.yaml
            kubectl apply -f frontend.yaml
            kubectl apply -f ingress.yaml
            
            echo "Updating deployment images..."
            kubectl set image deployment/frontend frontend=${{ secrets.DOCKERHUB_USERNAME }}/m-p-f:${{ github.sha }}
            kubectl set image deployment/backend backend=${{ secrets.DOCKERHUB_USERNAME }}/m-p-b:${{ github.sha }}
            
            echo "Waiting for rollout..."
            kubectl rollout status deployment/frontend --timeout=180s
            kubectl rollout status deployment/backend --timeout=180s
            
            echo "Current status:"
            kubectl get pods -o wide
            kubectl get svc
            kubectl get ingress
            kubectl get endpoints
