name: CI-CD to K3s

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/m-p-f
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/m-p-b

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy on K3s master using SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd ~/k3s

            echo "Applying Kubernetes files..."
            kubectl apply -f secrets.yaml
            kubectl apply -f database.yaml
            kubectl apply -f mysql.yaml
            kubectl apply -f backend.yaml
            kubectl apply -f backend-alias.yaml
            kubectl apply -f frontend.yaml
            kubectl apply -f ingress.yaml

            echo "Updating deployment images..."
            kubectl set image deployment/frontend frontend=${{ secrets.DOCKERHUB_USERNAME }}/m-p-f:${{ github.sha }}
            kubectl set image deployment/backend backend=${{ secrets.DOCKERHUB_USERNAME }}/m-p-b:${{ github.sha }}

            echo "Waiting for rollout..."
            kubectl rollout status deployment/frontend --timeout=180s
            kubectl rollout status deployment/backend --timeout=180s

            echo "Current status:"
            kubectl get pods -o wide
            kubectl get svc
            kubectl get ingress
            kubectl get endpoints
