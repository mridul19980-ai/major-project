name: Production 3-Tier Web App CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v3
    # 2. Authenticate with DockerHub
    - name: Authenticate with DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Build & Push API Backend Image (Tagging with github.sha for deployment tracking)
    - name: Build & Push API Backend Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }} -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./backend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

    # 4. Build & Push Static UI Frontend Image
    - name: Build & Push Static UI Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }} -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./frontend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
        
    # 5. Deploy on K3s master using SSH
    - name: Deploy on K3s master using SSH
      uses: appleboy/ssh-action@v1.2.2
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
            set -e
            
            # Move to the directory where SCP just dropped the files
            cd ~/k3s_deploy
            
            echo "Applying Kubernetes files..."
            kubectl apply -f secrets.yaml
            kubectl apply -f mysql.yaml
            kubectl apply -f backend.yaml
            kubectl apply -f frontend.yaml
            kubectl apply -f ingress.yaml
            
            echo "Updating deployment images to the newly built SHA tags..."
            kubectl set image deployment/frontend frontend=${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
            kubectl set image deployment/backend backend=${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}
            
            echo "Waiting for rollout..."
            kubectl rollout status deployment/frontend --timeout=180s
            kubectl rollout status deployment/backend --timeout=180s
            
            echo "Current status:"
            kubectl get pods -o wide
            kubectl get svc
            kubectl get ingress
            kubectl get endpoints
